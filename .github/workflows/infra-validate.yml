name: Infrastructure validation

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "docker-compose*.yml"
      - "Dockerfile*"
      - ".dockerignore"
      - ".github/workflows/infra-validate.yml"
  pull_request:
    paths:
      - "infra/**"
      - "docker-compose*.yml"
      - "Dockerfile*"
      - ".dockerignore"
      - ".github/workflows/infra-validate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ODF_POSTGRES_ADMIN_PASSWORD: validation-only-postgres-password
      ODF_REDIS_PASSWORD: validation-only-redis-password
      ODF_GRAFANA_ADMIN_PASSWORD: validation-only-grafana-password
      ODF_METRICS_TOKEN: validation-only-metrics-token
      KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME: validation-only-admin
      KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: validation-only-keycloak-admin-password
      ODF_DEMO_USER_PASSWORD: validation-only-demo-password
      ODF_CONNECTOR_CLIENT_SECRET: validation-only-connector-client-secret
      ODF_POSTGRES_URL: postgresql://validation-worker:validation-worker-password@odf-postgres:5432/odf
      ODF_REDIS_URL: redis://:validation-redis-password@odf-redis:6379/0
    steps:
      - uses: actions/checkout@v7
      - name: Validate migration manifest and static infrastructure invariants
        run: python3 infra/postgres/scripts/validate_static.py
      - name: Validate production compose syntax
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate local identity compose syntax
        run: docker compose -f docker-compose.identity.yml config --quiet

  migration-smoke:
    runs-on: ubuntu-latest
    env:
      ODF_POSTGRES_ADMIN_USER: odf_migrator
      ODF_POSTGRES_ADMIN_PASSWORD: validation-only-postgres-password
      ODF_REDIS_PASSWORD: validation-only-redis-password
      ODF_GRAFANA_ADMIN_PASSWORD: validation-only-grafana-password
      ODF_METRICS_TOKEN: validation-only-metrics-token
      ODF_POSTGRES_URL: postgresql://validation-worker:validation-worker-password@odf-postgres:5432/odf
      ODF_REDIS_URL: redis://:validation-only-redis-password@odf-redis:6379/0
    steps:
      - uses: actions/checkout@v7
      - name: Start durable dependencies
        run: docker compose up -d --wait odf-postgres odf-redis
      - name: Apply migrations
        run: docker compose --profile migrate run --rm migrate
      - name: Prove migrations are idempotent
        run: docker compose --profile migrate run --rm migrate
      - name: Verify tenant schema and row-level security
        run: >-
          docker compose exec -T odf-postgres
          psql --no-psqlrc --set=ON_ERROR_STOP=1
          --username odf_migrator --dbname odf
          --command "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_class WHERE oid = 'odf.raw_ingest_objects'::regclass AND relrowsecurity AND relforcerowsecurity) THEN RAISE EXCEPTION 'tenant data plane RLS is not forced'; END IF; END \$\$;"
      - name: Create least-privilege runtime probe principal
        run: >-
          docker compose exec -T odf-postgres
          psql --no-psqlrc --set=ON_ERROR_STOP=1
          --username odf_migrator --dbname odf
          --command "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'odf_validation_api') THEN CREATE ROLE odf_validation_api LOGIN PASSWORD 'validation-only-api-password' NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION INHERIT NOBYPASSRLS; END IF; END \$\$; GRANT odf_app TO odf_validation_api;"
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Probe the migrated database through the production runtime
        env:
          ODF_TEST_POSTGRES_URL: postgresql://odf_validation_api:validation-only-api-password@127.0.0.1:5432/odf
        run: npm test --workspace @open-data-fusion/postgres-runtime
      - name: Stop durable dependencies
        if: always()
        run: docker compose down --volumes --remove-orphans

  container-build:
    runs-on: ubuntu-latest
    env:
      ODF_POSTGRES_ADMIN_PASSWORD: validation-only-postgres-password
      ODF_REDIS_PASSWORD: validation-only-redis-password
      ODF_GRAFANA_ADMIN_PASSWORD: validation-only-grafana-password
      ODF_METRICS_TOKEN: validation-only-metrics-token
      ODF_POSTGRES_URL: postgresql://validation-worker:validation-worker-password@odf-postgres:5432/odf
      ODF_REDIS_URL: redis://:validation-only-redis-password@odf-redis:6379/0
    steps:
      - uses: actions/checkout@v7
      - name: Build application and worker images
        run: docker compose --profile application-preview --profile workers --profile edge build api web outbox-worker edge-agent
