# Reference NetworkPolicy contract. Workloads must carry the `app.kubernetes.io/name`
# labels used below. Managed object stores outside the cluster require a CNI-
# specific FQDN/egress policy in addition to this provider-neutral baseline.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-default-deny
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-dns-egress
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-connector-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: odf-mtls-gateway
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - { protocol: TCP, port: 9443 }
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: open-data-fusion-api
      ports:
        - { protocol: TCP, port: 4310 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-api-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: open-data-fusion-api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: odf-mtls-gateway
      ports:
        - { protocol: TCP, port: 4310 }
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - { protocol: TCP, port: 4310 }
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - { protocol: TCP, port: 5432 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - { protocol: TCP, port: 6379 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - { protocol: TCP, port: 8080 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: object-storage
      ports:
        - { protocol: TCP, port: 9000 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-postgres-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [open-data-fusion-api, outbox-worker, pipeline-worker, odf-migrate]
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-redis-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [open-data-fusion-api, outbox-worker]
      ports:
        - { protocol: TCP, port: 6379 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-outbox-egress-and-metrics
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outbox-worker
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - { protocol: TCP, port: 9465 }
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - { protocol: TCP, port: 5432 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - { protocol: TCP, port: 6379 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odf-object-storage-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: object-storage
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [open-data-fusion-api, object-storage-bootstrap]
      ports:
        - { protocol: TCP, port: 9000 }
