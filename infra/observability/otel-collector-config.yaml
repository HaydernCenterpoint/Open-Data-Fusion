receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464
  # Local durable sinks make traces/logs available during provider outages and
  # credential-free recovery rehearsals. Production can add an authenticated
  # OTLP backend while retaining these bounded incident buffers.
  file/traces:
    path: /var/lib/otel/traces.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 10
      localtime: false
  file/logs:
    path: /var/lib/otel/logs.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 10
      localtime: false
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/traces, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/logs, debug]
